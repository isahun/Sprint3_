<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Irene Sahun">
    <title>API Consumer App | Fetch vs Axios</title>

    <link href="/src/style.css" rel="stylesheet">
  </head>

  <body>
    <!-- Skip link -->
    <a href="#main" class="skip-link sr-only">
      Skip to main content
    </a>

    <article class="container">
      <header class="header">
        <h1 class="title">App de consum d'APIs</h1>
      </header>

      <main id="main" class="app-main">

        <!-- Controls -->
      <form>
        <section class="controls" aria-labelledby="controls-heading">
          <!-- Heading -->
          <h2 id="controls-heading" class="sr-only">Panell de control</h2>
          
          <!-- Selector -->
          <div class="control-group">
            <label for="fetch-method" class="controls__label">MÈTODE DE RECUPERACIÓ DE DADES</label>
            <select id="fetch-method" name="fetch-method">
              <option value="fetch" aria-describedby="Tria fetch com a mètode">Utilitza Fetch</option>
              <option value="axios" aria-describedby="Tria axios com a mètode">Utilitza Axios</option>
            </select>
          </div>

          <!-- Input -->
          <div class="control-group">
            <label for="search-input" class="controls__label">CERCA</label>
            <input id="search-input" type="search" placeholder="Introdueix text per cercar">
          </div>

          <!--API URL Selector-->
          <div class="control-group">
            <fieldset>
            <legend for="api-type" class="api-txt">TRIA UNA API</legend>
              <select id="api-type" name="api-type">
                <option value="posts">Posts</option>
                <option value="users">Users</option>
                <option value="comments">Comments</option>
              </select>
            </fieldset>
          </div>

          <!-- Show data -->
          <button id="fetch-btn" type="button">Mostra dades</button>
        </section>
      </form>

        <!-- Loading -->
        <div id="loading" role="status" aria-live="polite" class="loading hidden">Carregant...</div>

        <!-- Error -->
        <div id="error" role="alert" class="error hidden" aria-describedby="Missatge d'error"></div>

        <!-- Results -->
        <section id="results" class="results" aria-live="polite"></section>

        <!-- Page navigator -->
        <nav id="pagination" class="pagination" aria-label="Navegació entre pàgines">          
        </nav>
      </main>

      <footer>
        <p class="footer-txt">Creat per Irene V. Sahun en el marc del bootcamp de Frontend de la IT Academy</p>
      </footer>    
    </article>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
